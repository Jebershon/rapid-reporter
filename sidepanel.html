<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="panel">
    <div class="app">
      <header class="app-header">
        <img src="icons/icon-32.png" alt="" />
        <h1>Rapid Reporter</h1>
      </header>

      <div class="card">
        <div id="form">
        <div class="field">
          <label for="title">Bug title</label>
          <input id="title" type="text" value="[TEST] Rapid Reporter smoke test" />
        </div>

        <div id="dupes"></div>

        <div class="field">
          <label for="project">Project</label>
          <div class="select-wrap">
            <select id="project"><option value="">Loading…</option></select>
          </div>
        </div>

        <div class="field">
          <label for="type">Bug type</label>
          <div class="select-wrap">
            <select id="type"><option value="">(pick a project)</option></select>
          </div>
        </div>

        <div class="field">
          <label for="priority">Priority</label>
          <div class="select-wrap">
            <select id="priority"><option value="">Loading…</option></select>
          </div>
        </div>

        <div class="field">
          <label for="severity">Severity</label>
          <div class="select-wrap">
            <select id="severity">
              <option>Critical</option>
              <option selected>Major</option>
              <option>Medium</option>
              <option>Minor</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="assignee">Assignee</label>
          <div class="select-wrap">
            <select id="assignee"><option value="">(unassigned)</option></select>
          </div>
        </div>

        <div id="customFields"></div>

        <div class="field">
          <label>Description</label>
          <div class="rte">
            <div class="rte-tools">
              <button class="tool" data-cmd="bold" type="button" title="Bold" aria-label="Bold"><b>B</b></button>
              <button class="tool" data-cmd="italic" type="button" title="Italic" aria-label="Italic"><i>I</i></button>
              <button class="tool" data-cmd="underline" type="button" title="Underline" aria-label="Underline"><u>U</u></button>
              <button class="tool" data-cmd="insertUnorderedList" type="button" title="Bullet list" aria-label="Bullet list">•</button>
              <button class="tool" data-cmd="insertOrderedList" type="button" title="Numbered list" aria-label="Numbered list">1.</button>
            </div>
            <div id="notesEditor" class="rte-editor" contenteditable="true" dir="auto"
              data-placeholder="Optional — steps, expected result, or the correct Arabic text…"></div>
          </div>
        </div>

        <div class="field">
          <label>Auto-detected from the page</label>
          <div id="context" class="context">Detecting…</div>
        </div>

        <label class="switch">
          <input type="checkbox" id="includeDom" />
          <span class="track"><span class="knob"></span></span>
          <span>Include DOM snapshot <span class="warn">(may contain personal data)</span></span>
        </label>

        <button id="capture" class="btn btn-block" type="button">Capture screenshot</button>
        <div id="annotate" style="display: none">
          <div class="tools">
            <button class="tool" data-tool="box" type="button" title="Box" aria-label="Box">▭</button>
            <button class="tool" data-tool="arrow" type="button" title="Arrow" aria-label="Arrow">➜</button>
            <button class="tool" data-tool="redact" type="button" title="Redact" aria-label="Redact">▮</button>
            <button class="tool" data-tool="pan" type="button" title="Pan (drag to move when zoomed)" aria-label="Pan">✋</button>
            <button class="tool" id="undo" type="button" title="Undo" aria-label="Undo">↺</button>
            <button class="tool" id="zoomOut" type="button" title="Zoom out" aria-label="Zoom out">−</button>
            <button class="tool" id="zoomIn" type="button" title="Zoom in" aria-label="Zoom in">+</button>
          </div>
          <div class="canvas-wrap"><canvas id="shot"></canvas></div>
        </div>

        <button id="pick" class="btn btn-block" type="button">Pick element</button>
        <div id="picked" class="context" style="display: none"></div>

        <button id="file" class="btn btn-primary btn-block">File bug</button>

        <p id="status" class="status"></p>
        </div>

        <div id="success" style="display: none">
          <svg class="check" viewBox="0 0 52 52" aria-hidden="true">
            <circle cx="26" cy="26" r="23" />
            <path d="M15 27 l8 8 l15 -16" />
          </svg>
          <div class="success-msg">Bug filed</div>
          <a id="successLink" href="#" target="_blank">Open</a>
          <button id="newBug" class="btn btn-primary btn-block" type="button">File new bug</button>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
