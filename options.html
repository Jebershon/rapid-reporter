<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="options">
    <div class="app">
      <header class="app-header">
        <img src="icons/icon-32.png" alt="" />
        <h1>Rapid Reporter — Settings</h1>
      </header>

      <div class="card">
        <div class="field">
          <label for="url">Redmine URL</label>
          <input id="url" type="text" placeholder="https://tracker.rapiddata.com" />
        </div>

        <div class="field">
          <label for="key">Your Redmine API key</label>
          <input id="key" type="password" placeholder="paste your 40-character key" />
          <div class="hint">
            Get it from Redmine → My account → API access key → Show. It's stored only
            on this computer and is never put into the extension's code.
          </div>
        </div>

        <div class="row">
          <button id="save" class="btn btn-primary">Save</button>
          <span id="status" class="status"></span>
        </div>
      </div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
